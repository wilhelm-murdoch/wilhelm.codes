# Projects shown on /projects, newest/most-active first.
#   tag       - the taxonomy tag that gathers related blog posts + bits
#   status    - active | tinkering | shelved (drives the pill colour)
#   highlight - card accent colour (matches the highlight-* CSS + icon circle)
#   pack/icon - passed straight to the icon.html partial
#   website   - optional public site; repo - optional source (both shown as small icon links)
[[projects]]
name = "wilhelm.codes"
description = "This very site. A Hugo build I keep tinkering with: a self-assembling changelog, an activity graph, short-form bits and whatever else I feel like wiring up."
tag = "wilhelm.codes"
status = "active"
highlight = "purple"
pack = "duotone"
icon = "code"
website = "https://wilhelm.codes/"
repo = "https://github.com/wilhelm-murdoch/wilhelm.codes"

[[projects]]
name = "Glazier"
description = "A command-line tool that lets me describe a tmux workspace once and recreate it on demand. Type `glaze up` and the whole layout springs back to life."
tag = "glazier"
status = "active"
highlight = "blue"
pack = "duotone"
icon = "terminal-window"
repo = "https://github.com/wilhelm-murdoch/glazier"

[[projects]]
name = "Plant Smart"
description = "An older project in much need of some love. I wanted to create a free resource people could use to seee if their houseplants and safe around their pets."
tag = "plantsm.art"
status = "tinkering"
highlight = "emerald"
pack = "duotone"
icon = "seedling"
website = "https://plantsm.art/"
repo = "https://github.com/wilhelm-murdoch/plantsm.art"
