baseURL = "https://wilhelm.codes/"
locale = "en-US"
title = "Wilhelm Codes"
enableGitInfo = true

# Generate hugo_stats.json (the list of classes Hugo emits) so Tailwind's
# css.TailwindCSS pipeline can scan the rendered site, and bust the CSS cache
# when that file or any asset CSS changes.
[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/watching/hugo_stats\.json'
    target = 'css'
  [[build.cachebusters]]
    source = 'assets/.*\.css'
    target = 'css'

[taxonomies]
  tag = "tags"
  category = "category"

[menus]
  [[menus.main]]
    name = "Home"
    pageRef = "/"
    weight = 10
  [[menus.main]]
    name = "Archive"
    pageRef = "/archive"
    weight = 20
    [menus.main.params]
      highlight = "purple"
  [[menus.main]]
    name = "Bits"
    pageRef = "/bits"
    weight = 30
    [menus.main.params]
      highlight = "rose"
  [[menus.main]]
    name = "Changelog"
    pageRef = "/changelog"
    weight = 40
    [menus.main.params]
      highlight = "emerald"

[sitemap]
  changeFreq = "daily"

[params]
  description = "Slinger of nibbles, bits and bytes. Over 25 years of professional experience as a software engineer. Love making glowing rectangles go \"beep-boop\"."
  [params.author]
    email = "0xdeadbeef@devilmayco.de"
    name = "ɯlǝɥlᴉʍ"

[markup]
  [markup.tableOfContents]
    endLevel = 3
    ordered = true
    startLevel = 2
  [markup.highlight]
    style = "catppuccin-mocha"
