baseURL = "https://wilhelm.codes/"
locale = "en-US"
title = "Wilhelm Codes"
enableGitInfo = true

# Generate hugo_stats.json (the list of classes Hugo emits) so Tailwind's
# css.TailwindCSS pipeline can scan the rendered site, and bust the CSS cache
# when that file or any asset CSS changes.
[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/watching/hugo_stats\.json'
    target = 'css'
  [[build.cachebusters]]
    source = 'assets/.*\.css'
    target = 'css'

[taxonomies]
  tag = "tags"
  category = "category"

[menus]
  [[menus.main]]
    name = "Home"
    pageRef = "/"
    weight = 10
  # [[menus.main]]
  #   name = "Projects"
  #   pageRef = "/projects"
  #   weight = 20
  #   [menus.main.params]
  #     highlight = "orange"
  [[menus.main]]
    name = "Archive"
    pageRef = "/archive"
    weight = 30
    [menus.main.params]
      highlight = "purple"
  [[menus.main]]
    name = "Bits"
    pageRef = "/bits"
    weight = 40
    [menus.main.params]
      highlight = "rose"
  [[menus.main]]
    name = "Changelog"
    pageRef = "/changelog"
    weight = 50
    [menus.main.params]
      highlight = "emerald"

[sitemap]
  changeFreq = "daily"

# Two purpose-built RSS feeds, both served from the home page:
#   /articles.xml - longer-form blog posts
#   /bits.xml     - short-form bits (quotes, links, videos, blurbs)
[outputFormats]
  [outputFormats.ArticlesRSS]
    mediaType = "application/rss+xml"
    baseName = "articles"
    isPlainText = false
    isHTML = false
    rel = "alternate"
  [outputFormats.BitsRSS]
    mediaType = "application/rss+xml"
    baseName = "bits"
    isPlainText = false
    isHTML = false
    rel = "alternate"

[outputs]
  home = ["HTML", "ArticlesRSS", "BitsRSS"]
  section = ["HTML"]

[params]
  description = "Slinger of nibbles, bits and bytes. Over 25 years of professional experience as a software engineer. Love making glowing rectangles go \"beep-boop\"."
  [params.author]
    email = "0xdeadbeef@devilmayco.de"
    name = "ɯlǝɥlᴉʍ"

[markup]
  [markup.tableOfContents]
    endLevel = 3
    ordered = true
    startLevel = 2
  [markup.highlight]
    style = "github-dark"
