{{ define "main" }}

    class="fade-in-animation relative mx-auto mb-0 max-w-4xl pb-2 text-center md:mb-8"
  >
    {{ partial "header.html" . }}
  </header>

  <section
    class="fade-in-animation mx-auto mb-2 max-w-4xl border-b p-2 pb-4 sm:mb-6 sm:border-none sm:px-0"
  >
    {{ partial "activity-graph.html" . }}
  </section>

  <section class="fade-in-animation mx-auto mb-10 max-w-4xl">
    {{ partial "timeline.html" . }}
  </section>
{{ end }}
