{{ define "main" }}
  <header
    class="fade-in-animation relative mx-auto mb-0 max-w-4xl pb-2 text-center md:mb-8"
  >
    {{ partial "header.html" . }}
  </header>

  <section class="fade-in-animation mx-auto mb-10 max-w-4xl px-2 sm:px-0">
    {{ partial "activity-graph.html" . }}
  </section>

  <section class="fade-in-animation mx-auto mb-10 max-w-4xl">
    {{ range (first 50 (where .Site.RegularPages "Section" "blog")) }}
      {{ partial "views/row.html" . }}
    {{ end }}
  </section>
{{ end }}
