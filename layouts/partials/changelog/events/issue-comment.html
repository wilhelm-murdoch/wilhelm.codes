{{ partial "changelog/icon.html" ( dict "icon" "comments" "colour" "slate" ) }}
<p class="relative mb-2 pt-1 pr-20">
  {{ partial "changelog/author.html" .actor }}
  {{ .payload.action }} a comment on issue
  <strong>{{ .payload.issue.title }}</strong>
  <span class="absolute top-1 right-0 inline-block text-sm">
    <a href="{{ .payload.html_url }}" title="View these changes..."
      >#{{ .payload.issue.number }}</a
    >
  </span>
</p>
