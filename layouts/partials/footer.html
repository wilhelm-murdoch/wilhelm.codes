<div class="text-slate-300">
  made with
  <a
    href="https://gohugo.io"
    title="Hugo"
    class="border-b hover:border-b-slate-400 hover:text-slate-400"
    >Hugo</a
  >
  and
  <svg
    class="heartbeat-animation inline-block h-6 w-6 text-red-600"
    fill="currentColor"
    viewBox="0 0 20 20"
    xmlns="http://www.w3.org/2000/svg"
  >
    <path
      fill-rule="evenodd"
      d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z"
      clip-rule="evenodd"
    />
  </svg>
  by me
</div>

<div
  class="mt-6 flex items-center justify-center gap-1.5 font-mono text-xs text-slate-300"
>
  <svg
    class="h-3 w-3"
    fill="currentColor"
    viewBox="0 0 448 512"
    xmlns="http://www.w3.org/2000/svg"
    aria-hidden="true"
  >
    <path
      d="M0 64C0 46.3 14.3 32 32 32c229.8 0 416 186.2 416 416c0 17.7-14.3 32-32 32s-32-14.3-32-32C384 253.6 226.4 96 32 96C14.3 96 0 81.7 0 64zM0 416a64 64 0 1 1 128 0 64 64 0 1 1-128 0zM0 224c0-17.7 14.3-32 32-32c141.4 0 256 114.6 256 256c0 17.7-14.3 32-32 32s-32-14.3-32-32c0-106-86-192-192-192c-17.7 0-32-14.3-32-32z"
    />
  </svg>
  <span>rss:</span>
  <a
    href="/articles.xml"
    title="Articles RSS feed"
    class="border-b hover:border-b-slate-400 hover:text-slate-400"
    >articles</a
  >
  <span>&amp;</span>
  <a
    href="/bits.xml"
    title="Bits RSS feed"
    class="border-b hover:border-b-slate-400 hover:text-slate-400"
    >bits</a
  >
</div>

<div class="mt-8 text-center font-mono text-sm text-slate-200">
  {{ $date := now }}
  {{ if .GitInfo }}
    {{ $date = .GitInfo.AuthorDate }}
  {{ end }}

  {{ $date | time.Format ":date_long" }}
  {{ $date | time.Format ":time_medium" }}
</div>
