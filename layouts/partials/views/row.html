<article
  class="highlight-{{ .Params.highlight }} archive mb-2 flex rounded-none border-b px-2 py-4 shadow-none shadow-slate-100 transition sm:mb-8 sm:rounded-2xl sm:border sm:p-8 sm:shadow-md md:hover:scale-105"
>
  <div class="summary mr-4 hidden w-16 pt-1 md:inline-block lg:inline-block">
    <span
      class="fa-{{ .Params.pack }} fa-{{ .Params.icon }} h-8 w-8 rounded-full p-3"
    ></span>
  </div>
  <div>
    <h3 class="mb-2 font-light text-slate-800 sm:text-xl md:text-2xl">
      <a href="{{ .RelPermalink }}" title="{{ .LinkTitle }}">
        {{ .LinkTitle | safeHTML }}
      </a>
    </h3>
    <p class="text-sm text-slate-300">
      <span class="border-b-2 border-b-slate-100 font-medium text-slate-500"
        >{{ .Params.category }}</span
      >
      {{ with .GetTerms "tags" }}
        {{ if ne (len .) 0 }}
          +
          {{ partial "tags/inline.html" . }}
        {{ end }}
      {{ end }}
    </p>
  </div>
</article>
